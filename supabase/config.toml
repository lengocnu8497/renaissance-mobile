
[functions.chat-ai]
enabled = true
verify_jwt = true
import_map = "./functions/chat-ai/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/chat-ai/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/chat-ai/*.html" ]

[functions.stripe-webhook-handler]
enabled = true
verify_jwt = false
entrypoint = "./functions/stripe-webhook-handler/index.ts"

[functions.create-subscription]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-subscription/index.ts"

[functions.confirm-payment]
enabled = true
verify_jwt = false
entrypoint = "./functions/confirm-payment/index.ts"
